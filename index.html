<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarryTab</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="background" class="background"></div>
    <div id="onboarding-overlay" class="onboarding-overlay" hidden>
      <div class="onboarding-card">
        <div id="onboarding-step-engine" class="onboarding-step">
          <h1>Pick your search engine</h1>
          <p class="onboarding-sub">You can change this later.</p>
          <div id="engine-grid" class="engine-grid"></div>
          <input
            id="custom-template-input"
            class="custom-template-input"
            placeholder="https://example.com/search?q=%s"
            hidden
          />
          <button id="onboarding-next" class="onboarding-next" disabled>
            Next
          </button>
        </div>

        <div id="onboarding-step-color" class="onboarding-step" hidden>
          <h1>Pick your favorite color</h1>
          <p class="onboarding-sub">
            This sets the glow around your search bar.
          </p>
          <div id="color-grid" class="color-grid"></div>
          <button id="onboarding-done" class="onboarding-next">Done</button>
        </div>
      </div>
    </div>
    <div id="search-container" class="searchbar-container" hidden>
      <input
        id="search-input"
        class="searchbar-input"
        type="text"
        placeholder="Search or enter a URL"
        autocomplete="off"
        spellcheck="false"
      />
      <ul id="suggestions-dropdown" class="suggestions-dropdown" hidden></ul>
    </div>
    <script type="module" src="/src/main.js"></script>
    <button id="reset-settings" class="reset-settings-btn" title="Reset customization" aria-label="Reset customization">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
    <footer class="site-footer">StarryTab © 2026 - Made with love by water.</footer>
  </body>
</html>
